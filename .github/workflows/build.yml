name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-patcher:
    name: Windows native patcher
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build/cmake -G Ninja

      - name: Build native patcher
        shell: pwsh
        run: cmake --build build/cmake --target native-patcher

      - name: Smoke test
        shell: pwsh
        run: .\build\cmake\timwin-patch.exe --help

      - name: Hash artifact
        shell: pwsh
        run: Get-FileHash .\build\cmake\timwin-patch.exe -Algorithm SHA256

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            build/cmake/CMakeCache.txt
            build/cmake/CMakeFiles/**/*.log
          if-no-files-found: ignore

      - name: Upload patcher
        uses: actions/upload-artifact@v4
        with:
          name: timwin-patch-windows-x86
          path: build/cmake/timwin-patch.exe
          if-no-files-found: error
